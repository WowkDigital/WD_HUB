<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WD HUB | Wowk Digital Projects</title>
    <meta name="description" content="Central hub for open-source projects and tools created by Wowk Digital.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6366f1',
                        secondary: '#a855f7',
                        accent: '#ec4899',
                    },
                    animation: {
                        'gradient-x': 'gradient-x 15s ease infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        'gradient-x': {
                            '0%, 100%': { 'background-size': '200% 200%', 'background-position': 'left center' },
                            '50%': { 'background-size': '200% 200%', 'background-position': 'right center' },
                        },
                        'float': {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #030712;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-hover:hover {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('assets/bg.png');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.2;
            background-image: radial-gradient(#6366f1 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }

        .text-gradient {
            background: linear-gradient(to right, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-glow {
            position: relative;
        }
        
        .card-glow::after {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg, #6366f1, #a855f7, #ec4899);
            z-index: -1;
            border-radius: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            filter: blur(15px);
        }

        .card-glow:hover::after {
            opacity: 0.4;
        }
    </style>
</head>
<body class="text-gray-200 selection:bg-primary/30">
    
    <!-- Background Elements -->
    <div class="bg-glow"></div>
    <div class="bg-pattern"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px] animate-pulse-slow"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-accent/20 rounded-full blur-[120px] animate-pulse-slow"></div>

    <div class="flex-grow flex flex-col items-center py-12 px-4">
        <header class="text-center mb-16 space-y-4 max-w-2xl px-4">
            <div class="inline-block glass px-4 py-1.5 rounded-full text-sm font-medium border-primary/20 text-primary mb-2">
                Wowk Digital Ecosystem
            </div>
            <h1 class="text-5xl md:text-7xl font-bold tracking-tight">
                WD <span class="text-gradient">HUB</span>
            </h1>
            <p class="text-gray-400 text-lg md:text-xl font-light">
                Experimental tools, libraries, and projects. <br class="hidden md:block"> All my work in one central location.
            </p>
        </header>

        <main id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-7xl mb-20 px-4">
            <!-- Projects will be rendered here by JavaScript -->
        </main>
    </div>

    <!-- Data & Rendering Script -->
    <script>
        const projects = [
            {
                title: "Collage Creator",
                description: "A powerful tool for creating creative compositions and photo collages directly in the browser.",
                url: "https://wowkdigital.github.io/CollageCreator/",
                icon: "layout-grid",
                color: "primary"
            },
            {
                title: "ARW Toolkit",
                description: "A set of tools dedicated to working with Sony raw files (ARW). Automate and optimize your photography workflow.",
                url: "https://wowkdigital.github.io/ARW_Toolkit/",
                icon: "camera",
                color: "secondary"
            },
            {
                title: "Grapher 10",
                description: "Intuitive graph and data visualization generator. Export beautiful, publication-ready graphics for your reports.",
                url: "https://wowkdigital.github.io/grapher_10/",
                icon: "bar-chart-3",
                color: "accent"
            },
            {
                title: "Glitch Studio",
                description: "Experimental graphics effects studio. Destroy, deform and create unique glitch art effects with precision.",
                url: "https://wowkdigital.github.io/glitch_studio/",
                icon: "zap",
                color: "indigo-400"
            },
            {
                title: "Photo Compress",
                description: "Fast and efficient image compression tool. Reduce file size while maintaining high quality directly in your browser.",
                url: "https://wowkdigital.github.io/photo_compress/",
                icon: "file-image",
                color: "emerald-400"
            },
            {
                title: "Martix Effect",
                description: "Digital rain and matrix-style terminal animations. Customizable visual effects for cyberpunk aesthetics.",
                url: "https://wowkdigital.github.io/martix/",
                icon: "terminal",
                color: "lime-400"
            },
            {
                title: "Tile Generator",
                description: "Create seamless, high-quality tiled backgrounds and patterns for web and graphic design projects.",
                url: "https://wowkdigital.github.io/TileBackgroundGenerator/",
                icon: "layout-template",
                color: "sky-400"
            },
            {
                title: "Organic Patterns",
                description: "Generate unique organic shapes and abstract patterns with fluid motion and artistic flair.",
                url: "https://wowkdigital.github.io/organic_pattern_generator/",
                icon: "infinity",
                color: "rose-400"
            },
            {
                title: "PDF Extractor",
                description: "Extract high-resolution images from PDF files quickly and easily, directly within your browser.",
                url: "https://wowkdigital.github.io/pdf_extract_images/",
                icon: "file-output",
                color: "orange-400"
            },
            {
                title: "TextLab",
                description: "Advanced text analysis and processing utility. Real-time statistics, character limits, and intelligent text segmentation.",
                url: "https://github.com/WowkDigital/TextLab",
                icon: "file-text",
                color: "amber-400"
            },
            {
                title: "WD Footer",
                description: "A lightweight, customizable branded footer for Wowk Digital projects. Easy to integrate with dynamic links.",
                url: "https://github.com/WowkDigital/WowkDigitalFooter",
                icon: "panel-bottom",
                color: "cyan-400"
            },
            {
                title: "1D Automata",
                description: "Explore the fascinating world of 1D cellular automata. Visualize patterns emerging from simple mathematical rules.",
                url: "https://github.com/WowkDigital/1D_automata",
                icon: "binary",
                color: "blue-400"
            }
        ];

        function renderProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = projects.map(project => `
                <a href="${project.url}" target="_blank" class="card-glow">
                    <div class="glass glass-hover p-8 rounded-3xl transition-all duration-300 h-full flex flex-col group">
                        <div class="w-12 h-12 bg-${project.color}/10 rounded-2xl flex items-center justify-center mb-6 text-${project.color} group-hover:scale-110 transition-transform duration-300">
                            <i data-lucide="${project.icon}" class="w-6 h-6"></i>
                        </div>
                        <h2 class="text-2xl font-bold mb-3 group-hover:text-${project.color} transition-colors">${project.title}</h2>
                        <p class="text-gray-400 font-light leading-relaxed mb-6">
                            ${project.description}
                        </p>
                        <div class="mt-auto flex items-center text-sm font-medium text-${project.color}">
                            Launch Project <i data-lucide="arrow-up-right" class="w-4 h-4 ml-2"></i>
                        </div>
                    </div>
                </a>
            `).join('');
            
            // Re-initialize icons after rendering
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        document.addEventListener('DOMContentLoaded', renderProjects);
    </script>

    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
    </script>

    <!-- Wowk Digital Footer -->
    <script src="https://cdn.jsdelivr.net/gh/WowkDigital/WowkDigitalFooter@latest/wowk-digital-footer.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            WowkDigitalFooter.init({
                siteName: 'WD HUB',
                container: 'body',
                brandName: 'Wowk Digital',
                brandUrl: 'https://github.com/WowkDigital'
            });
        });
    </script>
</body>
</html>
