<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WD HUB | Wowk Digital Projects</title>
    <meta name="description" content="Central hub for open-source projects and tools created by Wowk Digital.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind-config.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="text-gray-200 selection:bg-primary/30">

    <!-- Background Elements -->
    <div class="bg-glow"></div>
    <div class="bg-pattern"></div>
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px] animate-pulse-slow"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-accent/20 rounded-full blur-[120px] animate-pulse-slow"></div>

    <div class="flex-grow flex flex-col items-center py-12 px-4">
        <header class="text-center mb-16 space-y-4 max-w-2xl px-4">
            <div class="inline-block glass px-4 py-1.5 rounded-full text-sm font-medium border-primary/20 text-primary mb-2">
                Wowk Digital Ecosystem
            </div>
            <h1 class="text-5xl md:text-7xl font-bold tracking-tight">
                WD <span class="text-gradient">HUB</span>
            </h1>
            <p class="text-gray-400 text-lg md:text-xl font-light">
                Experimental tools, libraries, and projects. <br class="hidden md:block"> All my work in one central location.
            </p>
        </header>

        <main id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 w-full max-w-7xl mb-20 px-4">
            <!-- Projects will be rendered here by JavaScript -->
        </main>
    </div>

    <!-- External Scripts -->
    <script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/WowkDigital/WowkDigitalFooter@latest/wowk-digital-footer.js"></script>

    <!-- App Logic -->
    <script src="js/data.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
